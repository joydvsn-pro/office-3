<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Office Escape — Level 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="game-root">

    <!-- Boot / loading screen -->
    <div id="screen-boot" class="screen">
      <div class="boot-card">
        <div class="boot-logo">🏢</div>
        <h1 class="game-title">OFFICE<span>ESCAPE</span></h1>
        <p class="boot-sub">Level 1 — «Конец рабочего дня»</p>
        <button id="btn-start" class="btn btn-primary">Начать смену</button>
        <p class="boot-hint">A/D или ◀ ▶ — бег · Space — прыжок</p>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hud-left">
        <div class="stat stat-stress">
          <span class="stat-icon">🔥</span>
          <div class="bar-track">
            <div id="bar-stress" class="bar-fill bar-stress-fill"></div>
          </div>
          <span class="stat-label">Стресс</span>
        </div>
        <div class="stat stat-energy">
          <span class="stat-icon">☕</span>
          <div class="bar-track">
            <div id="bar-energy" class="bar-fill bar-energy-fill"></div>
          </div>
          <span class="stat-label">Энергия</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="score-pill">
          <span class="score-icon">⭐</span>
          <span id="score-value">0</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Mobile controls -->
    <div id="mobile-controls" class="hidden">
      <div class="dpad">
        <button id="btn-left" class="ctrl-btn" aria-label="Влево">◀</button>
        <button id="btn-right" class="ctrl-btn" aria-label="Вправо">▶</button>
      </div>
      <button id="btn-jump" class="ctrl-btn ctrl-jump" aria-label="Прыжок">JUMP</button>
    </div>

    <!-- Win screen -->
    <div id="screen-win" class="screen hidden">
      <div class="result-card win-card">
        <div class="result-emoji">🎉</div>
        <h2 class="result-title">Level 1 Complete</h2>
        <p class="result-sub">«Сегодня получилось уйти вовремя.»</p>
        <div class="result-scoreboard">
          <div><span class="rs-label">Очки</span><span id="win-score">0</span></div>
          <div><span class="rs-label">Кофе собрано</span><span id="win-coffee">0</span></div>
        </div>
        <button id="btn-continue" class="btn btn-disabled" disabled>Continue</button>
        <p class="coming-soon">Level 2 — Coming Soon</p>
        <button id="btn-replay-win" class="btn btn-ghost">Пройти ещё раз</button>
      </div>
    </div>

    <!-- Lose screen -->
    <div id="screen-lose" class="screen hidden">
      <div class="result-card lose-card">
        <div class="result-emoji">🧟</div>
        <h2 class="result-title lose-title">ВЫГОРАНИЕ</h2>
        <p class="result-sub">«Нужно было уходить вовремя.»</p>
        <button id="btn-retry" class="btn btn-primary">Try Again</button>
      </div>
    </div>

  </div>

  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/level1.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
