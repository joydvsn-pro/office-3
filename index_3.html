<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Office Escape — Level 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --office-blue-1:#dce9fb;
  --office-blue-2:#b9d4f2;
  --ink:#20263a;
  --ink-soft:#4b5468;
  --coral:#ff7d59;
  --coral-dark:#e5613e;
  --teal:#33c2a4;
  --amber:#ffb648;
  --stress-red:#ff5064;
  --panel:#ffffff;
  --panel-shadow: 0 12px 30px rgba(28,40,70,.18);
  --radius-lg:28px;
  --radius-md:16px;
  font-family:'Inter',sans-serif;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background: linear-gradient(160deg,#eaf2fd 0%, #cfe1f7 55%, #b9d4f2 100%);
  -webkit-tap-highlight-color: transparent;
  touch-action:none;
}

#game-root{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

#game-canvas{
  display:block;
  width:100%;
  height:100%;
  touch-action:none;
}

.hidden{display:none !important;}

/* ---------- generic screen overlay ---------- */
.screen{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
  background: radial-gradient(circle at 50% 20%, rgba(220,235,255,.55), rgba(120,145,190,.55));
  backdrop-filter: blur(6px);
  animation: fadeIn .35s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.boot-card, .result-card{
  background:var(--panel);
  border-radius: var(--radius-lg);
  box-shadow: var(--panel-shadow);
  padding: 40px 44px 34px;
  text-align:center;
  max-width: 420px;
  width: 88vw;
  position:relative;
  border: 1px solid rgba(255,255,255,.6);
}

.boot-logo{
  font-size:52px;
  margin-bottom:6px;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,.15));
}

.game-title{
  font-family:'Baloo 2', sans-serif;
  font-weight:800;
  font-size: 34px;
  letter-spacing: .5px;
  color: var(--ink);
  margin: 4px 0 2px;
}
.game-title span{
  color: var(--coral);
  display:block;
  font-size: 28px;
  letter-spacing: 6px;
}

.boot-sub{
  color: var(--ink-soft);
  font-weight:600;
  margin: 6px 0 22px;
}

.boot-hint{
  margin-top:16px;
  font-size:13px;
  color: var(--ink-soft);
  opacity:.75;
}

.btn{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:18px;
  border:none;
  border-radius: 999px;
  padding: 14px 34px;
  cursor:pointer;
  transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}
.btn:active{ transform: scale(.96); }

.btn-primary{
  background: linear-gradient(135deg, var(--coral), var(--coral-dark));
  color:white;
  box-shadow: 0 10px 22px rgba(229,97,62,.4);
}
.btn-primary:hover{ box-shadow: 0 14px 26px rgba(229,97,62,.5); }

.btn-ghost{
  background: transparent;
  color: var(--ink-soft);
  border: 2px solid #e1e7f2;
  margin-top: 14px;
  font-size:14px;
  padding: 10px 22px;
}

.btn-disabled{
  background:#e4e8f0;
  color:#9aa2b5;
  cursor:not-allowed;
  box-shadow:none;
}

/* ---------- top stress bar (always the most prominent HUD element) ---------- */
#hud-stress-bar{
  position:absolute;
  top:0; left:0; right:0;
  z-index:25;
  display:flex;
  align-items:center;
  gap:10px;
  padding: 10px 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.75));
  box-shadow: 0 6px 18px rgba(28,40,70,.14);
  pointer-events:none;
}
.stress-icon{ font-size:20px; }
.stress-track{
  flex:1;
  max-width: 640px;
  height:18px;
  border-radius:999px;
  background:#e3e9f4;
  overflow:hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,.15);
}
.stress-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background: linear-gradient(90deg, var(--amber), var(--stress-red));
  transition: width .25s ease;
}
.stress-caption{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:.5px;
  color: var(--ink-soft);
  white-space:nowrap;
}

/* ---------- HUD (secondary row: energy + score) ---------- */
#hud{
  position:absolute;
  top:52px; left:0; right:0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding: 10px 18px;
  z-index:20;
  pointer-events:none;
}

.hud-left{
  display:flex;
  flex-direction:column;
  gap:8px;
  background: rgba(255,255,255,.75);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  box-shadow: 0 6px 18px rgba(28,40,70,.12);
  backdrop-filter: blur(4px);
}

.stat{
  display:flex;
  align-items:center;
  gap:8px;
}
.stat-icon{ font-size:16px; width:18px; text-align:center;}
.stat-label{ font-size:11px; font-weight:700; color:var(--ink-soft); width:52px;}

.bar-track{
  width:110px;
  height:10px;
  border-radius:999px;
  background:#e3e9f4;
  overflow:hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.12);
}
.bar-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  transition: width .25s ease;
}
.bar-stress-fill{ background: linear-gradient(90deg, var(--amber), var(--stress-red)); }
.bar-energy-fill{ background: linear-gradient(90deg, #6fd7c5, var(--teal)); }

.score-pill{
  background: rgba(255,255,255,.85);
  border-radius: 999px;
  padding: 10px 18px;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  color: var(--ink);
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow: 0 6px 18px rgba(28,40,70,.12);
}

/* ---------- mobile controls ---------- */
#mobile-controls{
  position:absolute;
  bottom:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding: 0 18px 22px;
  z-index:30;
  pointer-events:none;
}
.dpad{
  display:flex;
  gap:14px;
  pointer-events:auto;
}
.ctrl-btn{
  width:64px; height:64px;
  border-radius:50%;
  border:none;
  background: rgba(255,255,255,.55);
  color: var(--ink);
  font-size:22px;
  font-weight:800;
  box-shadow: 0 8px 18px rgba(28,40,70,.18);
  backdrop-filter: blur(3px);
  pointer-events:auto;
  user-select:none;
}
.ctrl-btn:active{ background: rgba(255,255,255,.85); transform: scale(.94); }

.ctrl-jump{
  width:92px; height:92px;
  font-family:'Baloo 2', sans-serif;
  font-size:16px;
  background: linear-gradient(135deg, rgba(255,125,89,.75), rgba(229,97,62,.75));
  color:white;
  pointer-events:auto;
}

/* ---------- result screens ---------- */
.result-emoji{ font-size:56px; margin-bottom:6px;}
.result-title{
  font-family:'Baloo 2', sans-serif;
  font-size:28px;
  color: var(--ink);
  margin:6px 0 4px;
}
.lose-title{ color:#c94a5c; letter-spacing:1px;}
.result-sub{
  color:var(--ink-soft);
  font-weight:600;
  margin-bottom: 18px;
}
.result-scoreboard{
  display:flex;
  justify-content:center;
  gap:26px;
  margin-bottom:20px;
}
.result-scoreboard > div{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size:22px;
  color: var(--ink);
}
.rs-label{
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:700;
  color: var(--ink-soft);
  margin-bottom:2px;
}
.coming-soon{
  margin-top:10px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
  color: var(--ink-soft);
  opacity:.7;
  text-transform:uppercase;
}

@media (max-width:520px){
  .boot-card, .result-card{ padding: 30px 22px 26px; }
  .game-title{ font-size:26px;}
  .game-title span{ font-size:22px;}
}

<body>

  <div id="game-root">

<script>
// audio.js — tiny synthesized SFX/music engine using the WebAudio API.
// No external assets required, keeps the project self-contained for GitHub Pages.

const Audio2 = (() => {
  let ctx = null;
  let musicNodes = [];
  let musicTimer = null;
  let enabled = true;

  function ensureCtx() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone({ freq = 440, duration = 0.15, type = 'sine', gain = 0.15, glideTo = null, delay = 0 }) {
    if (!enabled) return;
    const c = ensureCtx();
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    const t0 = c.currentTime + delay;
    osc.frequency.setValueAtTime(freq, t0);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + duration);
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(g).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }

  return {
    unlock() { ensureCtx(); },
    setEnabled(v) { enabled = v; },

    jump() {
      tone({ freq: 300, glideTo: 620, duration: 0.16, type: 'triangle', gain: 0.12 });
    },
    jumpBig() {
      tone({ freq: 320, glideTo: 780, duration: 0.2, type: 'triangle', gain: 0.15 });
      tone({ freq: 480, glideTo: 900, duration: 0.14, type: 'sine', gain: 0.08, delay: 0.03 });
    },
    land() {
      tone({ freq: 180, glideTo: 90, duration: 0.08, type: 'sine', gain: 0.08 });
    },
    coffee() {
      tone({ freq: 520, glideTo: 880, duration: 0.12, type: 'sine', gain: 0.14 });
      tone({ freq: 780, duration: 0.1, type: 'sine', gain: 0.1, delay: 0.06 });
    },
    cigarette() {
      tone({ freq: 220, glideTo: 260, duration: 0.15, type: 'sawtooth', gain: 0.08 });
    },
    hit() {
      tone({ freq: 160, glideTo: 60, duration: 0.25, type: 'sawtooth', gain: 0.16 });
    },
    stomp() {
      tone({ freq: 400, glideTo: 120, duration: 0.14, type: 'square', gain: 0.13 });
    },
    win() {
      [523, 659, 784, 1047].forEach((f, i) => tone({ freq: f, duration: 0.22, type: 'triangle', gain: 0.13, delay: i * 0.12 }));
    },
    lose() {
      [400, 340, 260, 180].forEach((f, i) => tone({ freq: f, duration: 0.3, type: 'sawtooth', gain: 0.12, delay: i * 0.14 }));
    },

    startMusic() {
      if (!enabled || musicTimer) return;
      const c = ensureCtx();
      const notes = [392, 440, 523, 587, 523, 440]; // gentle office elevator-music loop
      let i = 0;
      musicTimer = setInterval(() => {
        if (!enabled) return;
        tone({ freq: notes[i % notes.length], duration: 0.5, type: 'sine', gain: 0.035 });
        i++;
      }, 480);
    },
    stopMusic() {
      if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    }
  };
})();


// input.js — unifies keyboard + on-screen touch controls into one state object.

const Input = (() => {
  const state = { left: false, right: false, jump: false, jumpPressed: false, jumpBoost: false };
  let jumpWasDown = false;
  let lastJumpPressTime = 0;
  let pendingBoost = false;
  const DOUBLE_TAP_WINDOW = 320; // ms

  function registerJumpPress() {
    const now = performance.now();
    if (now - lastJumpPressTime < DOUBLE_TAP_WINDOW) pendingBoost = true;
    lastJumpPressTime = now;
  }

  function keyDown(e) {
    if (['ArrowLeft', 'KeyA'].includes(e.code)) state.left = true;
    if (['ArrowRight', 'KeyD'].includes(e.code)) state.right = true;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (!e.repeat) registerJumpPress();
      state.jump = true;
    }
  }
  function keyUp(e) {
    if (['ArrowLeft', 'KeyA'].includes(e.code)) state.left = false;
    if (['ArrowRight', 'KeyD'].includes(e.code)) state.right = false;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') state.jump = false;
  }

  function bindButton(el, key) {
    if (!el) return;
    const on = (ev) => {
      ev.preventDefault();
      if (key === 'jump' && !state[key]) registerJumpPress();
      state[key] = true;
    };
    const off = (ev) => { ev.preventDefault(); state[key] = false; };
    el.addEventListener('touchstart', on, { passive: false });
    el.addEventListener('touchend', off, { passive: false });
    el.addEventListener('touchcancel', off, { passive: false });
    el.addEventListener('mousedown', on);
    el.addEventListener('mouseup', off);
    el.addEventListener('mouseleave', off);
  }

  function init() {
    window.addEventListener('keydown', keyDown);
    window.addEventListener('keyup', keyUp);
    bindButton(document.getElementById('btn-left'), 'left');
    bindButton(document.getElementById('btn-right'), 'right');
    bindButton(document.getElementById('btn-jump'), 'jump');

    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) document.getElementById('mobile-controls').classList.remove('hidden');
  }

  function update() {
    state.jumpPressed = state.jump && !jumpWasDown;
    if (state.jumpPressed) {
      state.jumpBoost = pendingBoost;
      pendingBoost = false;
    } else {
      state.jumpBoost = false;
    }
    jumpWasDown = state.jump;
  }

  return { init, update, state };
})();


// entities.js — Player, Enemy, Boss, Collectible classes + shared physics constants.

const PHYSICS = {
  gravity: 0.62,
  maxFall: 15,
  moveSpeed: 3.4,
  accel: 0.5,
  friction: 0.72,
  jumpVelocity: -12.6,
  groundY: 460 // baseline ground top (world coords), set per-level too
};

function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ---------------------------------------------------------------- Player
class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 34; this.h = 46;
    this.vx = 0; this.vy = 0;
    this.onGround = false;
    this.facing = 1;
    this.state = 'idle'; // idle, run, jump, fall, win, dead
    this.animTimer = 0;
    this.animFrame = 0;
    this.invincibleTimer = 0;
    this.dead = false;
    this.won = false;
    this.stress = 0;
    this.maxStress = 20;
    this.energy = 40;
    this.maxEnergy = 100;
    this.score = 0;
    this.coffeeCount = 0;
  }

  get bottom() { return this.y + this.h; }
  get right() { return this.x + this.w; }

  hurt(amount) {
    if (this.invincibleTimer > 0 || this.dead || this.won) return false;
    this.stress = Math.min(this.maxStress, this.stress + amount);
    this.invincibleTimer = 70;
    Audio2.hit();
    if (this.stress >= this.maxStress) {
      this.triggerBurnout();
    }
    return true;
  }

  triggerBurnout() {
    if (this.dead) return;
    this.dead = true;
    this.state = 'dead';
    this.vx = 0;
    this.vy = -6;
    Audio2.lose();
  }

  triggerWin() {
    if (this.won) return;
    this.won = true;
    this.state = 'win';
    this.vx = 0;
    Audio2.win();
  }

  update(input, platforms) {
    if (this.won || this.dead) {
      this.vy = Math.min(this.vy + PHYSICS.gravity, PHYSICS.maxFall);
      this.y += this.vy;
      this._resolveVertical(platforms);
      this.animTimer++;
      return;
    }

    if (input.left) { this.vx -= PHYSICS.accel; this.facing = -1; }
    if (input.right) { this.vx += PHYSICS.accel; this.facing = 1; }
    if (!input.left && !input.right) this.vx *= PHYSICS.friction;
    this.vx = Math.max(-PHYSICS.moveSpeed, Math.min(PHYSICS.moveSpeed, this.vx));
    if (Math.abs(this.vx) < 0.03) this.vx = 0;

    if (input.jumpPressed && this.onGround) {
      this.vy = input.jumpBoost ? PHYSICS.jumpVelocity * 1.32 : PHYSICS.jumpVelocity;
      this.onGround = false;
      if (input.jumpBoost) Audio2.jumpBig(); else Audio2.jump();
    }

    this.vy = Math.min(this.vy + PHYSICS.gravity, PHYSICS.maxFall);

    this.x += this.vx;
    this._resolveHorizontal(platforms);
    const wasFalling = this.vy > 0;
    const groundedBefore = this.onGround;
    this.y += this.vy;
    this.onGround = false;
    this._resolveVertical(platforms);
    if (this.onGround && !groundedBefore && wasFalling) Audio2.land();

    if (this.invincibleTimer > 0) this.invincibleTimer--;
    if (!this.onGround) {
      this.state = this.vy < 0 ? 'jump' : 'fall';
    } else if (Math.abs(this.vx) > 0.3) {
      this.state = 'run';
    } else {
      this.state = 'idle';
    }
    this.animTimer++;
  }

  _resolveHorizontal(platforms) {
    for (const p of platforms) {
      if (!aabbOverlap(this, p)) continue;
      if (this.vx > 0) this.x = p.x - this.w;
      else if (this.vx < 0) this.x = p.x + p.w;
      this.vx = 0;
    }
    if (this.x < 0) this.x = 0;
  }

  _resolveVertical(platforms) {
    for (const p of platforms) {
      if (!aabbOverlap(this, p)) continue;
      if (this.vy > 0) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.onGround = true;
      } else if (this.vy < 0) {
        this.y = p.y + p.h;
        this.vy = 0;
      }
    }
  }
}

// ---------------------------------------------------------------- Enemy
const ENEMY_TYPES = {
  manager: { label: 'Менеджер', emoji: '🧑‍💼', w: 34, h: 42, speed: 1.7, pattern: 'patrol', color: '#5b6b8c', stompable: true },
  call: { label: 'Срочный созвон', emoji: '📞', w: 30, h: 30, speed: 2.5, pattern: 'wave', color: '#ff8a65', stompable: true },
  report: { label: 'Отчёт', emoji: '📄', w: 28, h: 32, speed: 2.7, pattern: 'wave', color: '#f2c94c', stompable: true },

  quarterly: { label: 'После квартального отчёта', emoji: '😵', w: 34, h: 42, speed: 2.1, pattern: 'erratic', color: '#b06ab3', stompable: true },

// Phrases colleagues yell when they catch the player — shown as a speech-bubble popup.
const COLLEAGUE_PHRASES = [
  'ЭТО СРОЧНО!',
  'ТЫ ОБЕЩАЛ ЕЩЁ ВЧЕРА!',
  'ДАВАЙ СИНКАНЕМСЯ',
  'ТАМ ВОПРОС НА 2 МИНУТЫ'
];

class Enemy {
  constructor(type, x, y, rangeMin, rangeMax) {
    this.type = type;
    const def = ENEMY_TYPES[type];
    this.def = def;
    this.x = x; this.y = y;
    this.w = def.w; this.h = def.h;
    this.vx = def.speed;
    this.vy = 0;
    this.rangeMin = rangeMin;
    this.rangeMax = rangeMax;
    this.baseY = y;
    this.alive = true;
    this.squash = 0;
    this.timer = Math.random() * 100;
  }

  get bottom() { return this.y + this.h; }

  update() {
    if (!this.alive) { this.squash = Math.min(1, this.squash + 0.1); return; }
    this.timer += 1;

    if (this.def.pattern === 'patrol') {
      this.x += this.vx;
      if (this.x < this.rangeMin || this.x + this.w > this.rangeMax) this.vx *= -1;
    } else if (this.def.pattern === 'wave') {
      this.x += this.vx;
      if (this.x < this.rangeMin || this.x + this.w > this.rangeMax) this.vx *= -1;
      this.y = this.baseY + Math.sin(this.timer * 0.12) * 16;
    } else if (this.def.pattern === 'erratic') {
      this.x += this.vx;
      if (this.x < this.rangeMin || this.x + this.w > this.rangeMax || Math.random() < 0.02) this.vx *= -1;
      if (Math.random() < 0.05) this.vx = this.def.speed * (Math.random() < 0.5 ? 1 : -1);
    } else if (this.def.pattern === 'static') {
      // stationary hazard (desk phone) — just rings in place, handled in renderer via timer
    }
  }

  defeat() {
    this.alive = false;
    Audio2.stomp();
  }
}

// ---------------------------------------------------------------- Boss
class Boss {
  constructor(x, y, w = 70, h = 110) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.baseY = y;
    this.timer = 0;
  }
  update() {
    this.timer += 1;
    this.y = this.baseY + Math.sin(this.timer * 0.05) * 4;
  }
}

// ---------------------------------------------------------------- Collectible
class Collectible {
  constructor(type, x, y) {
    this.type = type; // 'coffee' | 'cigarette'
    this.x = x; this.y = y;
    this.w = 26; this.h = 26;
    this.collected = false;
    this.bobTimer = Math.random() * 10;
  }
  update() { this.bobTimer += 0.08; }
  get drawY() { return this.y + Math.sin(this.bobTimer) * 4; }
}

// ---------------------------------------------------------------- Sign (wall decoration)
class Sign {
  constructor(text, x, y) {
    this.text = text; this.x = x; this.y = y;
  }
}


// level1.js — declarative layout for Level 1, plus a factory that builds fresh
// runtime entities so the level can be replayed cleanly. Adding Level 2 later
// just means creating level2.js with the same shape and registering it in game.js.

function buildLevel1(groundY) {

  const WORLD_WIDTH = 4200;

  const groundHeight = 200;
  const platforms = [
    { x: 0, y: groundY, w: WORLD_WIDTH, h: groundHeight, type: 'ground' }
  ];

  const floaters = [
    { x: 420, y: groundY - 110, w: 140, h: 26 },
    { x: 760, y: groundY - 170, w: 120, h: 26 },
    { x: 1180, y: groundY - 120, w: 160, h: 26 },
    { x: 1620, y: groundY - 90, w: 130, h: 26 },
    { x: 2050, y: groundY - 150, w: 150, h: 26 },
    { x: 2480, y: groundY - 110, w: 140, h: 26 },
    { x: 2900, y: groundY - 170, w: 130, h: 26 },
    { x: 3260, y: groundY - 100, w: 120, h: 26 },
    { x: 3620, y: groundY - 60, w: 90, h: 26 },
    { x: 3760, y: groundY - 130, w: 90, h: 26 }
  ];
  for (const f of floaters) platforms.push({ ...f, type: 'floater' });

  const decorations = [
    { type: 'plant', x: 120, y: groundY },
    { type: 'coffeepoint', x: 300, y: groundY },
    { type: 'desk', x: 520, y: groundY },
    { type: 'monitor', x: 560, y: groundY },
    { type: 'meetingroom', x: 850, y: groundY },
    { type: 'plant', x: 1080, y: groundY },
    { type: 'printer', x: 1300, y: groundY },
    { type: 'desk', x: 1500, y: groundY },
    { type: 'monitor', x: 1540, y: groundY },
    { type: 'dashboard', x: 1780, y: groundY },
    { type: 'plant', x: 2000, y: groundY },
    { type: 'meetingroom', x: 2220, y: groundY },
    { type: 'coffeepoint', x: 2460, y: groundY },
    { type: 'desk', x: 2650, y: groundY },
    { type: 'monitor', x: 2690, y: groundY },
    { type: 'printer', x: 2900, y: groundY },
    { type: 'plant', x: 3100, y: groundY },
    { type: 'dashboard', x: 3300, y: groundY },
    { type: 'meetingroom', x: 3500, y: groundY },
    { type: 'plant', x: 3900, y: groundY }
  ];

  const signTexts = ['Тихо, идёт совещание', 'Budget Review', 'Q3 Results', 'KPI', 'Strategy', 'Director', 'Meeting Room', 'Finance', 'Deadline'];
  const signs = [];
  let sx = 250;
  let i = 0;
  while (sx < WORLD_WIDTH - 300) {
    signs.push({ text: signTexts[i % signTexts.length], x: sx, y: groundY - 260 });
    sx += 430;
    i++;
  }

  const collectibleLayout = [
    ['coffee', 200, groundY - 40],
    ['cigarette', 650, groundY - 40],
    ['coffee', 1220, groundY - 160],
    ['cigarette', 1660, groundY - 130],
    ['coffee', 2090, groundY - 190],
    ['cigarette', 2750, groundY - 40],
    ['coffee', 3150, groundY - 40],
    ['coffee', 3480, groundY - 40]
  ];

  const enemyLayout = [
    ['manager', 500, 420, 760],
    ['call', 900, 800, 1180],
    ['report', 1300, 1200, 1600],
    ['manager', 1650, 1550, 1980],
    ['zombie', 2050, 1950, 2400],
    ['call', 2250, 2150, 2550],
    ['quarterly', 2600, 2480, 2900],
    ['report', 2950, 2850, 3250],
    ['manager', 3150, 3050, 3450],
    ['zombie', 3400, 3300, 3650],
    ['quarterly', 3650, 3550, 3850]
  ];

  // Stationary desk phones — they don't move, but ringing on contact still costs +1 stress.
  const phoneLayout = [
    720, 1460, 2180, 2820, 3550
  ];

  const bossX = 3920;
  const boss = { x: bossX, y: groundY - 150, w: 80, h: 150 };
  const door = { x: bossX + 160, y: groundY - 140, w: 70, h: 140 };

  return {
    worldWidth: WORLD_WIDTH,
    groundY,
    platforms,
    decorations,
    signs,
    collectibleLayout,
    enemyLayout,
    phoneLayout,
    bossSpec: boss,
    doorSpec: door,
    playerStart: { x: 60, y: groundY - 200 }
  };
}

function instantiateLevel1(groundY) {
  const layout = buildLevel1(groundY);

  const collectibles = layout.collectibleLayout.map(([type, x, y]) => new Collectible(type, x, y));
  const enemies = layout.enemyLayout.map(([type, x, min, max]) => new Enemy(type, x, groundY - ENEMY_TYPES[type].h, min, max));
  const phones = layout.phoneLayout.map(x => new Enemy('phone', x, groundY - ENEMY_TYPES.phone.h, x, x));
  const boss = new Boss(layout.bossSpec.x, layout.bossSpec.y, layout.bossSpec.w, layout.bossSpec.h);
  const signs = layout.signs.map(s => new Sign(s.text, s.x, s.y));

  return {
    worldWidth: layout.worldWidth,
    groundY: layout.groundY,
    platforms: layout.platforms,
    decorations: layout.decorations,
    signs,
    collectibles,
    enemies: enemies.concat(phones),
    boss,
    door: { ...layout.doorSpec, open: false },
    playerStart: layout.playerStart
  };
}


// renderer.js — all Canvas 2D drawing code. Pure functions of (ctx, camera, world state).

const Renderer = (() => {

  function drawBackground(ctx, width, height, groundY, camX) {
    const g = ctx.createLinearGradient(0, 0, 0, height);
    g.addColorStop(0, '#eaf3ff');
    g.addColorStop(0.55, '#d7e8fb');
    g.addColorStop(1, '#c3dbf3');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, width, height);

    const parX = -camX * 0.25;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ffffff';
    const winW = 70, winH = 90, gap = 40;
    const startCol = Math.floor(-parX / (winW + gap)) - 1;
    for (let c = startCol; c < startCol + Math.ceil(width / (winW + gap)) + 2; c++) {
      const wx = c * (winW + gap) + parX;
      const wy = groundY - 340;
      roundRect(ctx, wx, wy, winW, winH, 10);
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#7893c2';
    ctx.fillRect(0, groundY - 4, width, 4);
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawGroundAndPlatforms(ctx, platforms, camX, height) {
    for (const p of platforms) {
      const sx = p.x - camX;
      if (sx + p.w < -50 || sx > 4000) continue;
      if (p.type === 'ground') {
        const g = ctx.createLinearGradient(0, p.y, 0, p.y + 40);
        g.addColorStop(0, '#dfe7f4');
        g.addColorStop(1, '#c7d3e8');
        ctx.fillStyle = g;
        ctx.fillRect(sx, p.y, p.w, height - p.y);
        ctx.fillStyle = '#b9c6e0';
        ctx.fillRect(sx, p.y, p.w, 6);
        ctx.strokeStyle = 'rgba(160,175,205,.35)';
        ctx.lineWidth = 1;
        for (let x = 0; x < p.w; x += 90) {
          ctx.beginPath();
          ctx.moveTo(sx + x, p.y + 10);
          ctx.lineTo(sx + x, p.y + 40);
          ctx.stroke();
        }
      } else {
        ctx.save();
        ctx.shadowColor = 'rgba(30,40,70,.25)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 6;
        const g = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(1, '#e3ebf7');
        ctx.fillStyle = g;
        roundRect(ctx, sx, p.y, p.w, p.h, 8);
        ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#c7d3e8';
        ctx.fillRect(sx + 6, p.y + p.h - 3, p.w - 12, 3);
      }
    }
  }

  function drawSigns(ctx, signs, camX) {
    for (const s of signs) {
      const sx = s.x - camX;
      if (sx < -220 || sx > 4000) continue;
      ctx.save();
      ctx.shadowColor = 'rgba(30,40,70,.2)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffffff';
      ctx.font = '600 15px Inter, sans-serif';
      const textW = ctx.measureText(s.text).width;
      const padX = 16;
      roundRect(ctx, sx - textW / 2 - padX, s.y, textW + padX * 2, 34, 10);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#3a4460';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.text, sx, s.y + 18);
    }
  }

  function drawDecorations(ctx, decorations, camX, groundY) {
    for (const d of decorations) {
      const sx = d.x - camX;
      if (sx < -140 || sx > 4000) continue;
      const gy = groundY;
      ctx.save();
      ctx.translate(sx, gy);
      switch (d.type) {
        case 'plant': drawPlant(ctx); break;
        case 'coffeepoint': drawCoffeePoint(ctx); break;
        case 'desk': drawDesk(ctx); break;
        case 'monitor': drawMonitor(ctx); break;
        case 'meetingroom': drawMeetingRoom(ctx); break;
        case 'printer': drawPrinter(ctx); break;
        case 'dashboard': drawDashboard(ctx); break;
      }
      ctx.restore();
    }
  }

  function drawPlant(ctx) {
    ctx.fillStyle = '#c98552';
    roundRect(ctx, -14, -34, 28, 34, 4); ctx.fill();
    ctx.fillStyle = '#4caf7d';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      const ang = -Math.PI / 2 + (i - 2) * 0.4;
      ctx.ellipse(Math.cos(ang) * 10, -34 + Math.sin(ang) * 22, 8, 18, ang, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCoffeePoint(ctx) {
    ctx.fillStyle = '#8a5a3c';
    roundRect(ctx, -30, -60, 60, 60, 6); ctx.fill();
    ctx.fillStyle = '#c8925f';
    roundRect(ctx, -26, -56, 52, 14, 4); ctx.fill();
    ctx.font = '26px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('☕', 0, -20);
  }

  function drawDesk(ctx) {
    ctx.fillStyle = '#b9c6e0';
    ctx.fillRect(-40, -6, 80, 6);
    ctx.fillStyle = '#8d9bc2';
    ctx.fillRect(-34, 0, 6, 40);
    ctx.fillRect(28, 0, 6, 40);
    ctx.fillStyle = '#dfe7f4';
    roundRect(ctx, -40, -12, 80, 8, 3); ctx.fill();
  }

  function drawMonitor(ctx) {
    ctx.fillStyle = '#3a4460';
    roundRect(ctx, -22, -46, 44, 32, 4); ctx.fill();
    ctx.fillStyle = '#7fd8ff';
    roundRect(ctx, -18, -42, 36, 24, 3); ctx.fill();
    ctx.fillStyle = '#3a4460';
    ctx.fillRect(-4, -14, 8, 8);
  }

  function drawMeetingRoom(ctx) {
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = '#9fb3d8';
    ctx.lineWidth = 4;
    ctx.strokeRect(-46, -150, 92, 150);
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.fillRect(-42, -146, 84, 142);
    ctx.restore();
    ctx.fillStyle = '#4b5468';
    ctx.font = '600 11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MEETING ROOM', 0, -156);
  }

  function drawPrinter(ctx) {
    ctx.fillStyle = '#c7d3e8';
    roundRect(ctx, -24, -38, 48, 38, 6); ctx.fill();
    ctx.fillStyle = '#8d9bc2';
    ctx.fillRect(-24, -14, 48, 6);
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🖨️', 0, -20);
  }

  function drawDashboard(ctx) {
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, -34, -70, 68, 50, 8); ctx.fill();
    ctx.fillStyle = '#33c2a4';
    ctx.fillRect(-26, -34, 10, 16);
    ctx.fillStyle = '#ff8a65';
    ctx.fillRect(-12, -44, 10, 26);
    ctx.fillStyle = '#ffb648';
    ctx.fillRect(2, -28, 10, 10);
    ctx.fillStyle = '#4b5468';
    ctx.font = '600 10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DASHBOARD', 0, -74);
  }

  function drawCollectibles(ctx, items, camX) {
    for (const c of items) {
      if (c.collected) continue;
      const sx = c.x - camX;
      if (sx < -60 || sx > 4000) continue;
      const sy = c.drawY;
      ctx.save();
      ctx.shadowColor = 'rgba(30,40,70,.25)';
      ctx.shadowBlur = 8;
      ctx.font = '26px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(c.type === 'coffee' ? '☕' : '🚬', sx + c.w / 2, sy + c.h / 2);
      ctx.restore();
    }
  }

  function drawEnemy(ctx, e, camX) {
    const sx = e.x - camX;
    if (sx < -80 || sx > 4000) return;
    ctx.save();
    const squashY = e.squash;
    const jitter = (e.type === 'phone' && e.alive) ? Math.sin(e.timer * 0.9) * 2 : 0;
    ctx.translate(sx + e.w / 2 + jitter, e.y + e.h);
    ctx.scale(1, 1 - squashY * 0.8);
    ctx.globalAlpha = e.alive ? 1 : Math.max(0, 1 - squashY * 1.4);

    ctx.shadowColor = 'rgba(30,40,70,.3)';
    ctx.shadowBlur = 6;
    ctx.fillStyle = e.def.color;
    roundRect(ctx, -e.w / 2, -e.h, e.w, e.h, 8);
    ctx.fill();

    ctx.font = `${Math.floor(e.h * 0.7)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.def.emoji, 0, -e.h / 2);
    ctx.restore();
  }

  function drawBoss(ctx, boss, camX) {
    const sx = boss.x - camX;
    ctx.save();
    ctx.translate(sx, boss.y);
    ctx.shadowColor = 'rgba(30,40,70,.35)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle = '#2b2f45';
    ctx.fillRect(10, boss.h - 30, 22, 30);
    ctx.fillRect(boss.w - 32, boss.h - 30, 22, 30);
    const g = ctx.createLinearGradient(0, 0, 0, boss.h);
    g.addColorStop(0, '#3c4468');
    g.addColorStop(1, '#242a44');
    ctx.fillStyle = g;
    roundRect(ctx, 0, 20, boss.w, boss.h - 40, 14);
    ctx.fill();
    ctx.fillStyle = '#f4f6fb';
    ctx.beginPath();
    ctx.moveTo(boss.w / 2 - 14, 26);
    ctx.lineTo(boss.w / 2 + 14, 26);
    ctx.lineTo(boss.w / 2, 60);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#d4a24c';
    ctx.beginPath();
    ctx.moveTo(boss.w / 2 - 6, 30);
    ctx.lineTo(boss.w / 2 + 6, 30);
    ctx.lineTo(boss.w / 2, boss.h - 50);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#e7b98c';
    ctx.beginPath();
    ctx.ellipse(boss.w / 2, 0, 22, 24, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(boss.w / 2 - 14, -6); ctx.lineTo(boss.w / 2 - 4, -3);
    ctx.moveTo(boss.w / 2 + 14, -6); ctx.lineTo(boss.w / 2 + 4, -3);
    ctx.stroke();
    ctx.restore();
  }

  function drawDoor(ctx, door, camX) {
    const sx = door.x - camX;
    ctx.save();
    ctx.shadowColor = 'rgba(30,40,70,.3)';
    ctx.shadowBlur = 12;
    const frameColor = door.open ? '#33c2a4' : '#8d9bc2';
    ctx.fillStyle = frameColor;
    roundRect(ctx, sx - 6, door.y - 6, door.w + 12, door.h + 6, 10);
    ctx.fill();
    ctx.fillStyle = door.open ? '#eafff7' : '#3a4460';
    roundRect(ctx, sx, door.y, door.w, door.h, 8);
    ctx.fill();
    if (door.open) {
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.font = '26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🚪', sx + door.w / 2, door.y + door.h / 2 + 10);
    } else {
      ctx.fillStyle = '#c7d3e8';
      ctx.beginPath();
      ctx.arc(sx + door.w - 12, door.y + door.h / 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle = '#4b5468';
    ctx.font = '700 12px "Baloo 2", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ВЫХОД', sx + door.w / 2, door.y - 14);
  }

  function drawPlayer(ctx, p, camX) {
    const sx = p.x - camX;
    ctx.save();
    ctx.translate(sx + p.w / 2, p.y + p.h / 2);

    if (p.invincibleTimer > 0 && Math.floor(p.invincibleTimer / 5) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    const facing = p.facing;
    ctx.scale(facing, 1);

    const t = p.animTimer;
    let legSwing = 0, armSwing = 0, bodyTilt = 0, bob = 0;

    if (p.state === 'run') {
      legSwing = Math.sin(t * 0.35) * 12;
      armSwing = Math.sin(t * 0.35 + Math.PI) * 10;
      bob = Math.abs(Math.sin(t * 0.35)) * 2;
    } else if (p.state === 'jump') {
      legSwing = -6; armSwing = -14; bodyTilt = -0.05;
    } else if (p.state === 'fall') {
      legSwing = 6; armSwing = 10; bodyTilt = 0.05;
    } else if (p.state === 'win') {
      armSwing = -20 - Math.sin(t * 0.2) * 6;
    } else if (p.state === 'dead') {
      bodyTilt = 0.5;
    }

    ctx.rotate(bodyTilt);
    ctx.translate(0, -bob);

    const isZombie = p.state === 'dead';
    const skin = isZombie ? '#9db08a' : '#f0c29a';
    const shirt = isZombie ? '#c9d3c0' : '#ffffff';
    const tie = isZombie ? '#6b7a5e' : '#2c3e66';
    const pants = isZombie ? '#5c6b52' : '#33415c';

    ctx.save();
    ctx.translate(-6, 6);
    ctx.rotate(legSwing * 0.03);
    ctx.fillStyle = pants;
    roundRect(ctx, -4, 0, 8, 16, 3); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(6, 6);
    ctx.rotate(-legSwing * 0.03);
    ctx.fillStyle = pants;
    roundRect(ctx, -4, 0, 8, 16, 3); ctx.fill();
    ctx.restore();

    ctx.fillStyle = shirt;
    ctx.save();
    ctx.shadowColor = 'rgba(30,40,70,.2)';
    ctx.shadowBlur = 4;
    roundRect(ctx, -13, -14, 26, 26, 8);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = tie;
    ctx.beginPath();
    ctx.moveTo(-4, -12);
    ctx.lineTo(4, -12);
    ctx.lineTo(0, -4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-3, -4);
    ctx.lineTo(3, -4);
    ctx.lineTo(2, 10);
    ctx.lineTo(0, 13);
    ctx.lineTo(-2, 10);
    ctx.closePath();
    ctx.fill();

    ctx.save();
    ctx.translate(-13, -8);
    ctx.rotate(armSwing * 0.04 + (p.state === 'win' ? -1.4 : 0));
    ctx.fillStyle = shirt;
    roundRect(ctx, -4, 0, 8, 16, 4); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(13, -8);
    ctx.rotate(-armSwing * 0.04 + (p.state === 'win' ? 1.4 : 0));
    ctx.fillStyle = shirt;
    roundRect(ctx, -4, 0, 8, 16, 4); ctx.fill();
    ctx.restore();

    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.ellipse(0, -26, 13, 13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isZombie ? '#4a5540' : '#3a2e26';
    ctx.beginPath();
    ctx.ellipse(0, -34, 13, 8, 0, Math.PI, 0);
    ctx.fill();

    if (p.state === 'dead') {
      ctx.strokeStyle = '#2a331f';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-6, -28); ctx.lineTo(-2, -24); ctx.moveTo(-2, -28); ctx.lineTo(-6, -24); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, -28); ctx.lineTo(6, -24); ctx.moveTo(6, -28); ctx.lineTo(2, -24); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, -18, 3, 0, Math.PI); ctx.stroke();
    } else if (p.state === 'win') {
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath(); ctx.arc(-4, -27, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -27, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -22, 4, 0, Math.PI); ctx.stroke();
    } else {
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath(); ctx.arc(-4, -27, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -27, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#c98860'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -21, 2.4, 0, Math.PI); ctx.stroke();
    }

    ctx.restore();
  }

  function drawPopups(ctx, popups, camX) {
    for (const p of popups) {
      const t = p.life / p.maxLife;
      const sx = p.x - camX;
      const sy = p.y - (1 - t) * 34;
      const alpha = Math.min(1, t * 2.2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = '700 14px "Baloo 2", sans-serif';
      const textW = ctx.measureText(p.text).width;
      const padX = 14, padY = 10;
      const bw = textW + padX * 2, bh = 30 + padY;
      const bx = sx - bw / 2, by = sy - bh - 14;

      ctx.shadowColor = 'rgba(30,40,70,.3)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff4e8';
      roundRect(ctx, bx, by, bw, bh, 12);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(sx - 8, by + bh);
      ctx.lineTo(sx + 8, by + bh);
      ctx.lineTo(sx, by + bh + 12);
      ctx.closePath();
      ctx.fillStyle = '#fff4e8';
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#c94a3c';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.text, sx, by + bh / 2 - 2);
      ctx.restore();
    }
  }

  return {
    drawBackground, drawGroundAndPlatforms, drawSigns, drawDecorations,
    drawCollectibles, drawEnemy, drawBoss, drawDoor, drawPlayer, drawPopups
  };
})();


// game.js — orchestrates everything: canvas setup, game loop, collisions, UI wiring.
// To add Level 2 later: create js/level2.js exporting instantiateLevel2(groundY)
// with the same return shape as instantiateLevel1, then add it to LEVELS below
// and call Game.loadLevel(2) from the win screen's Continue button.

const LEVELS = {
  1: instantiateLevel1
};

const Game = (() => {
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');

  let width = 960, height = 600, dpr = 1;
  let groundY = 460;
  let camX = 0;
  let state = 'boot'; // boot | playing | win | lose
  let currentLevelNum = 1;
  let level = null;
  let player = null;
  let rafId = null;

  let popups = [];

  const els = {
    hud: document.getElementById('hud'),
    hudStressBar: document.getElementById('hud-stress-bar'),
    barStress: document.getElementById('bar-stress'),
    barEnergy: document.getElementById('bar-energy'),
    scoreValue: document.getElementById('score-value'),
    screenBoot: document.getElementById('screen-boot'),
    screenWin: document.getElementById('screen-win'),
    screenLose: document.getElementById('screen-lose'),
    winScore: document.getElementById('win-score'),
    winCoffee: document.getElementById('win-coffee'),
    btnStart: document.getElementById('btn-start'),
    btnRetry: document.getElementById('btn-retry'),
    btnReplayWin: document.getElementById('btn-replay-win')
  };

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = Math.max(420, Math.min(window.innerHeight, 720));
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    groundY = height - 130;
  }

  function loadLevel(num) {
    currentLevelNum = num;
    const factory = LEVELS[num];
    level = factory(groundY);
    player = new Player(level.playerStart.x, level.playerStart.y);
    camX = 0;
  }

  function resetLevel() {
    loadLevel(currentLevelNum);
    popups = [];
    state = 'playing';
    els.screenLose.classList.add('hidden');
    els.screenWin.classList.add('hidden');
    els.hud.classList.remove('hidden');
    els.hudStressBar.classList.remove('hidden');
    Audio2.startMusic();
  }

  function startGame() {
    Audio2.unlock();
    els.screenBoot.classList.add('hidden');
    resetLevel();
  }

  // ---------------------------------------------------------- collisions
  function handleCollisions() {
    // collectibles
    for (const c of level.collectibles) {
      if (c.collected) continue;
      if (aabbOverlap(player, { x: c.x, y: c.drawY, w: c.w, h: c.h })) {
        c.collected = true;
        if (c.type === 'coffee') {
          player.energy = Math.min(player.maxEnergy, player.energy + 10);
          player.stress = Math.max(0, player.stress - 1);
          player.score += 50;
          player.coffeeCount++;
          Audio2.coffee();
        } else {
          player.score += 30;
          Audio2.cigarette();
        }
      }
    }

    // enemies
    for (const e of level.enemies) {
      if (!e.alive) continue;
      if (!aabbOverlap(player, e)) continue;
      const stomping = e.def.stompable && player.vy > 0 && (player.bottom - e.y) < e.h * 0.55;
      if (stomping) {
        e.defeat();
        player.vy = PHYSICS.jumpVelocity * 0.55;
        player.score += 100;
      } else {
        const hurt = player.hurt(1);
        if (hurt) {
          player.vx = (player.x < e.x ? -1 : 1) * 4;
          spawnPopup(e);
        }
      }
    }

    // boss
    if (!player.dead && !player.won && aabbOverlap(player, level.boss)) {
      player.triggerBurnout();
    }

    // door opens once boss is cleared
    if (!level.door.open && player.x > level.boss.x + level.boss.w - 10) {
      level.door.open = true;
    }

    // reaching the (open) door => win
    if (level.door.open && !player.won && !player.dead && aabbOverlap(player, level.door)) {
      player.triggerWin();
    }
  }

  // ---------------------------------------------------------- popups
  function spawnPopup(source) {
    const text = COLLEAGUE_PHRASES[Math.floor(Math.random() * COLLEAGUE_PHRASES.length)];
    popups.push({ text, x: source.x + source.w / 2, y: source.y, life: 1.3, maxLife: 1.3 });
  }

  function updatePopups(dt) {
    for (const p of popups) p.life -= dt;
    popups = popups.filter(p => p.life > 0);
  }

  // ---------------------------------------------------------- HUD
  function updateHud() {
    const stressPct = Math.min(100, (player.stress / player.maxStress) * 100);
    const energyPct = Math.min(100, (player.energy / player.maxEnergy) * 100);
    els.barStress.style.width = stressPct + '%';
    els.barEnergy.style.width = energyPct + '%';
    els.scoreValue.textContent = player.score;
  }

  function showWin() {
    state = 'win';
    Audio2.stopMusic();
    els.winScore.textContent = player.score;
    els.winCoffee.textContent = player.coffeeCount;
    els.hud.classList.add('hidden');
    els.hudStressBar.classList.add('hidden');
    setTimeout(() => els.screenWin.classList.remove('hidden'), 650);
  }

  function showLose() {
    state = 'lose';
    Audio2.stopMusic();
    els.hud.classList.add('hidden');
    els.hudStressBar.classList.add('hidden');
    setTimeout(() => els.screenLose.classList.remove('hidden'), 550);
  }

  // ---------------------------------------------------------- loop
  function update() {
    Input.update();
    player.update(Input.state, level.platforms);

    for (const e of level.enemies) e.update();
    for (const c of level.collectibles) c.update();
    level.boss.update();

    if (state === 'playing') {
      handleCollisions();
      updateHud();
      if (player.dead && player.y > height + 200) { /* settled off-screen, screens already scheduled */ }
      if (player.won && state === 'playing') showWin();
      if (player.dead && state === 'playing') showLose();
    }

    updatePopups(1 / 60);

    // camera follows player, clamped to level bounds
    const targetCamX = player.x - width * 0.38;
    camX = Math.max(0, Math.min(targetCamX, level.worldWidth - width));
  }

  function draw() {
    Renderer.drawBackground(ctx, width, height, groundY, camX);
    Renderer.drawDecorations(ctx, level.decorations, camX, groundY);
    Renderer.drawSigns(ctx, level.signs, camX);
    Renderer.drawGroundAndPlatforms(ctx, level.platforms, camX, height);
    Renderer.drawCollectibles(ctx, level.collectibles, camX);
    for (const e of level.enemies) Renderer.drawEnemy(ctx, e, camX);
    Renderer.drawBoss(ctx, level.boss, camX);
    Renderer.drawDoor(ctx, level.door, camX);
    Renderer.drawPlayer(ctx, player, camX);
    Renderer.drawPopups(ctx, popups, camX);
  }

  function loop() {
    update();
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function init() {
    resize();
    window.addEventListener('resize', resize);
    Input.init();

    els.btnStart.addEventListener('click', startGame);
    els.btnRetry.addEventListener('click', resetLevel);
    els.btnReplayWin.addEventListener('click', resetLevel);

    loadLevel(1);
    draw(); // paint one static frame behind the boot screen
    rafId = requestAnimationFrame(loop);
  }

  return { init };
})();

window.addEventListener('DOMContentLoaded', Game.init);

</script>
</body>
</html>
